name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test

  build:
    name: next build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/citofono?schema=public
          SESSION_SECRET: test-secret-not-real
          ANTHROPIC_API_KEY: sk-test
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  e2e:
    name: e2e (playwright smoke)
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: citofono
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/citofono?schema=public
      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/citofono?schema=public
          SESSION_SECRET: e2e-secret
          ANTHROPIC_API_KEY: sk-test
          NEXT_PUBLIC_APP_URL: http://localhost:3000
      - run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/citofono?schema=public
          SESSION_SECRET: e2e-secret
          ANTHROPIC_API_KEY: sk-test
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CI: 'true'
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
